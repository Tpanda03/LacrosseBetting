services:
  - type: web
    name: lax-odds
    env: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: lax-odds-db
          property: connectionString

databases:
  - name: lax-odds-db
    plan: free
