<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAX ODDS — Illinois Tech Lacrosse Betting Lines</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --bg-elevated: #1a1a25;
            --accent-gold: #d4af37;
            --accent-gold-dim: #9a7d28;
            --accent-green: #00ff88;
            --accent-red: #ff4757;
            --accent-blue: #4facfe;
            --accent-purple: #a855f7;
            --text-primary: #ffffff;
            --text-secondary: #8a8a9a;
            --text-muted: #5a5a6a;
            --border-subtle: rgba(212, 175, 55, 0.15);
            --glow-gold: 0 0 40px rgba(212, 175, 55, 0.3);
            --scarlet: #c41e3a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-pattern {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(196, 30, 58, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(212, 175, 55, 0.05) 0%, transparent 50%),
                linear-gradient(180deg, #0a0a0f 0%, #0f0f18 100%);
        }

        .grid-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-image: 
                linear-gradient(rgba(196, 30, 58, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(196, 30, 58, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        header {
            padding: 1.5rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-subtle);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 15, 0.9);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-icon {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, var(--scarlet) 0%, #8b1428 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            color: white;
            box-shadow: 0 0 30px rgba(196, 30, 58, 0.4);
        }

        .logo h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 3px;
            background: linear-gradient(135deg, var(--scarlet) 0%, var(--accent-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo span {
            font-size: 0.7rem;
            color: var(--text-secondary);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .db-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0.8rem;
            background: var(--bg-elevated);
            border-radius: 6px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 6px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--scarlet) 0%, #8b1428 100%);
            color: white;
            box-shadow: 0 0 20px rgba(196, 30, 58, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 40px rgba(196, 30, 58, 0.5);
        }

        .btn-secondary {
            background: var(--bg-elevated);
            color: var(--text-primary);
            border: 1px solid var(--border-subtle);
        }

        .odds-format {
            display: flex;
            gap: 0.2rem;
            background: var(--bg-dark);
            padding: 0.2rem;
            border-radius: 6px;
        }

        .format-btn {
            padding: 0.4rem 0.8rem;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 0.75rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .format-btn.active {
            background: var(--bg-elevated);
            color: var(--accent-gold);
        }

        main {
            padding: 2rem 3rem;
            max-width: 1500px;
            margin: 0 auto;
        }

        /* Featured Game Section */
        .featured-section {
            margin-bottom: 2rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .section-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: var(--accent-gold);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .live-badge {
            background: var(--accent-green);
            color: var(--bg-dark);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 1px;
            animation: pulse 1.5s infinite;
        }

        .featured-card {
            background: linear-gradient(135deg, var(--bg-card) 0%, rgba(196, 30, 58, 0.1) 100%);
            border: 2px solid var(--scarlet);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(196, 30, 58, 0.2);
        }

        .featured-header {
            padding: 1.5rem 2rem;
            background: linear-gradient(135deg, rgba(196, 30, 58, 0.2) 0%, transparent 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .featured-teams {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .featured-team {
            text-align: center;
        }

        .featured-team-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 2px;
        }

        .featured-team-record {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .featured-vs {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            color: var(--accent-gold);
        }

        .featured-info {
            text-align: right;
        }

        .featured-date {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .featured-time {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .featured-location {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .featured-body {
            padding: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1.5rem;
        }

        .odds-block {
            background: var(--bg-dark);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
        }

        .odds-block-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .odds-block-values {
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        .odds-item {
            background: var(--bg-elevated);
            border-radius: 8px;
            padding: 1rem 1.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            min-width: 120px;
        }

        .odds-item:hover {
            border-color: var(--accent-gold);
            transform: translateY(-2px);
        }

        .odds-item-team {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .odds-item-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.3rem;
            font-weight: 700;
        }

        .odds-item-value.favorite { color: var(--accent-red); }
        .odds-item-value.underdog { color: var(--accent-green); }
        .odds-item-value.neutral { color: var(--accent-blue); }

        .win-prob {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-subtle);
        }

        .prob-bar {
            height: 8px;
            background: var(--bg-dark);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }

        .prob-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--scarlet), var(--accent-gold));
            transition: width 0.5s ease;
        }

        .prob-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-subtle);
            padding-bottom: 0.75rem;
            overflow-x: auto;
        }

        .tab {
            padding: 0.6rem 1.2rem;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .tab.active {
            background: var(--bg-elevated);
            color: var(--accent-gold);
        }

        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Future Games Grid */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 1.25rem;
        }

        .game-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .game-card:hover {
            border-color: var(--accent-gold);
            transform: translateY(-3px);
        }

        .game-card.past {
            opacity: 0.6;
        }

        .game-card-header {
            padding: 1rem 1.25rem;
            background: var(--bg-elevated);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .game-matchup {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .game-team {
            text-align: center;
        }

        .game-team-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .game-team-record {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .game-vs {
            color: var(--accent-gold);
            font-family: 'Bebas Neue', sans-serif;
        }

        .game-date-info {
            text-align: right;
            font-size: 0.8rem;
        }

        .game-date {
            color: var(--text-primary);
        }

        .game-time {
            color: var(--text-muted);
        }

        .game-card-body {
            padding: 1rem 1.25rem;
        }

        .game-odds-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 0;
            border-bottom: 1px solid var(--border-subtle);
        }

        .game-odds-row:last-child {
            border-bottom: none;
        }

        .game-odds-type {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .game-odds-values {
            display: flex;
            gap: 0.75rem;
        }

        .game-odd {
            padding: 0.4rem 0.8rem;
            background: var(--bg-dark);
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .game-odd:hover {
            background: var(--bg-elevated);
        }

        .game-result {
            text-align: center;
            padding: 0.5rem;
            font-weight: 600;
        }

        .game-result.win { color: var(--accent-green); }
        .game-result.loss { color: var(--accent-red); }

        /* Player Props Section */
        .props-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }

        .prop-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            padding: 1.25rem;
        }

        .prop-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border-subtle);
        }

        .prop-player {
            font-weight: 600;
            font-size: 1rem;
        }

        .prop-position {
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            background: var(--bg-elevated);
            border-radius: 4px;
            color: var(--accent-purple);
        }

        .prop-lines {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .prop-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .prop-type {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .prop-odds {
            display: flex;
            gap: 0.5rem;
        }

        .prop-odd {
            padding: 0.3rem 0.6rem;
            background: var(--bg-dark);
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .prop-odd:hover {
            background: var(--bg-elevated);
        }

        /* Team Comparison */
        .comparison-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .team-stats-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            overflow: hidden;
        }

        .team-stats-header {
            padding: 1rem 1.5rem;
            background: var(--bg-elevated);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 2px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .team-record-badge {
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            padding: 0.3rem 0.8rem;
            background: var(--bg-dark);
            border-radius: 20px;
        }

        .team-stats-body {
            padding: 1rem 1.5rem;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 0.6rem 0;
            border-bottom: 1px solid var(--border-subtle);
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
        }

        .stat-value.good { color: var(--accent-green); }
        .stat-value.bad { color: var(--accent-red); }

        /* Database Panel */
        .db-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 1.5rem;
        }

        .db-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }

        .db-stat {
            background: var(--bg-dark);
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
        }

        .db-stat .label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .db-stat .value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            color: var(--accent-gold);
            margin-top: 0.25rem;
        }

        .console {
            background: #0d0d12;
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
            max-height: 180px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
        }

        .console-line {
            padding: 0.2rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .console-line.info { color: var(--accent-blue); }
        .console-line.success { color: var(--accent-green); }
        .console-line.error { color: var(--accent-red); }
        .console-line.warning { color: var(--accent-gold); }

        .timestamp {
            color: var(--text-muted);
            margin-right: 0.5rem;
        }

        footer {
            padding: 1.5rem 3rem;
            border-top: 1px solid var(--border-subtle);
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 1000;
        }

        .toast {
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 0.75rem 1.25rem;
            margin-top: 0.5rem;
            animation: slideIn 0.3s ease;
        }

        .toast.success { border-left: 3px solid var(--accent-green); }
        .toast.error { border-left: 3px solid var(--accent-red); }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 1200px) {
            .comparison-grid { grid-template-columns: 1fr; }
            .featured-body { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            header { padding: 1rem; flex-wrap: wrap; gap: 1rem; }
            main { padding: 1rem; }
            .games-grid { grid-template-columns: 1fr; }
            .db-stats { grid-template-columns: repeat(2, 1fr); }
            .featured-teams { flex-direction: column; gap: 1rem; }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="grid-overlay"></div>

    <header>
        <div class="logo">
            <div class="logo-icon">IIT</div>
            <div>
                <h1>LAX ODDS</h1>
                <span>Illinois Tech Lacrosse Lines</span>
            </div>
        </div>
        <div class="header-actions">
            <div class="db-status">
                <div class="status-dot"></div>
                <span>Database Active</span>
            </div>
            <div class="odds-format">
                <button class="format-btn active" data-format="american">American</button>
                <button class="format-btn" data-format="decimal">Decimal</button>
                <button class="format-btn" data-format="fractional">Fractional</button>
            </div>
            <button class="btn btn-primary" id="generateBtn">
                ⚡ Generate Lines
            </button>
        </div>
    </header>

    <main>
        <!-- Featured Next Game -->
        <section class="featured-section" id="featuredGame">
            <div class="section-header">
                <div class="section-title">
                    🎯 NEXT GAME
                    <span class="live-badge">UPCOMING</span>
                </div>
            </div>
            <div class="featured-card" id="featuredCard">
                <!-- Populated by JS -->
            </div>
        </section>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-tab="future">Future Games</button>
            <button class="tab" data-tab="props">Player Props</button>
            <button class="tab" data-tab="comparison">Team Comparison</button>
            <button class="tab" data-tab="results">Past Results</button>
            <button class="tab" data-tab="database">Database</button>
        </div>

        <!-- Future Games -->
        <section class="content-section active" id="future-section">
            <div class="games-grid" id="futureGamesGrid">
                <!-- Populated by JS -->
            </div>
        </section>

        <!-- Player Props -->
        <section class="content-section" id="props-section">
            <div class="section-header">
                <div class="section-title">📊 Player Prop Bets</div>
            </div>
            <div class="props-grid" id="propsGrid">
                <!-- Populated by JS -->
            </div>
        </section>

        <!-- Team Comparison -->
        <section class="content-section" id="comparison-section">
            <div class="comparison-grid" id="comparisonGrid">
                <!-- Populated by JS -->
            </div>
        </section>

        <!-- Past Results -->
        <section class="content-section" id="results-section">
            <div class="games-grid" id="resultsGrid">
                <!-- Populated by JS -->
            </div>
        </section>

        <!-- Database -->
        <section class="content-section" id="database-section">
            <div class="db-panel">
                <div class="section-header">
                    <div class="section-title">🗄️ IndexedDB Storage</div>
                    <div style="display: flex; gap: 0.5rem;">
                        <button class="btn btn-secondary" id="exportBtn">Export JSON</button>
                        <button class="btn btn-secondary" id="clearDbBtn">Clear</button>
                    </div>
                </div>
                <div class="db-stats">
                    <div class="db-stat">
                        <div class="label">Teams</div>
                        <div class="value" id="teamCount">0</div>
                    </div>
                    <div class="db-stat">
                        <div class="label">Players</div>
                        <div class="value" id="playerCount">0</div>
                    </div>
                    <div class="db-stat">
                        <div class="label">Games</div>
                        <div class="value" id="gameCount">0</div>
                    </div>
                    <div class="db-stat">
                        <div class="label">Odds Generated</div>
                        <div class="value" id="oddsCount">0</div>
                    </div>

        // ==========================================
        // ODDS ENGINE

        const OddsEngine = {
            calculateWinProbability(team1, team2) {
                // Enhanced model using multiple factors
                const t1GPG = team1.goalsPerGame || (team1.goals / team1.games);
                const t1GAPG = team1.goalsAllowedPerGame || (team1.goalsAllowed / team1.games);
                const t2GPG = team2.goalsPerGame || (team2.goals / team2.games);
                const t2GAPG = team2.goalsAllowedPerGame || (team2.goalsAllowed / team2.games);

                // Offensive/defensive efficiency
                const t1Offense = t1GPG;
                const t1Defense = t1GAPG;
                const t2Offense = t2GPG;
                const t2Defense = t2GAPG;

                // Expected goals
                const t1Expected = (t1Offense + t2Defense) / 2;
                const t2Expected = (t2Offense + t1Defense) / 2;

                // Factor in faceoff % (possession matters)
                const faceoffAdj1 = (team1.faceoffPct || 0.5) * 0.1;
                const faceoffAdj2 = (team2.faceoffPct || 0.5) * 0.1;

                // Win record factor
                const t1WinPct = team1.wins / (team1.wins + team1.losses) || 0.5;
                const t2WinPct = team2.wins / (team2.wins + team2.losses) || 0.5;

                // Combined score
                const t1Score = (t1Expected * 0.4) + (t1WinPct * 0.35) + (faceoffAdj1 * 0.15) + ((team1.clearPct || 0.75) * 0.1);
                const t2Score = (t2Expected * 0.4) + (t2WinPct * 0.35) + (faceoffAdj2 * 0.15) + ((team2.clearPct || 0.75) * 0.1);

                return t1Score / (t1Score + t2Score);
            },

            probabilityToAmerican(prob) {
                if (prob >= 0.5) {
                    return Math.round(-100 * prob / (1 - prob));
                } else {
                    return Math.round(100 * (1 - prob) / prob);
                }
            },

            americanToDecimal(american) {
                if (american > 0) return (american / 100) + 1;
                return (100 / Math.abs(american)) + 1;
            },

            americanToFractional(american) {
                let decimal = this.americanToDecimal(american);
                let fraction = decimal - 1;
                const gcd = (a, b) => b ? gcd(b, a % b) : a;
                const num = Math.round(fraction * 100);
                const den = 100;
                const div = gcd(num, den);
                return `${num / div}/${den / div}`;
            },

            calculateSpread(team1, team2) {
                const t1GPG = team1.goalsPerGame || (team1.goals / team1.games);
                const t2GPG = team2.goalsPerGame || (team2.goals / team2.games);
                const t1GAPG = team1.goalsAllowedPerGame || (team1.goalsAllowed / team1.games);
                const t2GAPG = team2.goalsAllowedPerGame || (team2.goalsAllowed / team2.games);
                
                const t1Expected = (t1GPG + t2GAPG) / 2;
                const t2Expected = (t2GPG + t1GAPG) / 2;
                
                return (t1Expected - t2Expected).toFixed(1);
            },

            calculateTotal(team1, team2) {
                const t1GPG = team1.goalsPerGame || (team1.goals / team1.games);
                const t2GPG = team2.goalsPerGame || (team2.goals / team2.games);
                const t1GAPG = team1.goalsAllowedPerGame || (team1.goalsAllowed / team1.games);
                const t2GAPG = team2.goalsAllowedPerGame || (team2.goalsAllowed / team2.games);
                
                const expected = ((t1GPG + t2GAPG) / 2) + ((t2GPG + t1GAPG) / 2);
                return (Math.round(expected * 2) / 2).toFixed(1);
            },

            generateGameOdds(team1Key, team2Key) {
                const team1 = TeamsData.illinoisTech;
                const team2 = TeamsData[team2Key] || {
                    goalsPerGame: 9, goalsAllowedPerGame: 9,
                    faceoffPct: 0.5, clearPct: 0.75,
                    wins: 2, losses: 2
                };

                const winProb = this.calculateWinProbability(team1, team2);
                const t1ML = this.probabilityToAmerican(winProb);
                const t2ML = this.probabilityToAmerican(1 - winProb);
                const spread = this.calculateSpread(team1, team2);
                const total = this.calculateTotal(team1, team2);

                return {
                    moneyline: { team1: t1ML, team2: t2ML },
                    spread: { line: spread, odds: -110 },
                    total: { line: total, over: -110, under: -110 },
                    winProb: { team1: (winProb * 100).toFixed(1), team2: ((1 - winProb) * 100).toFixed(1) }
                };
            },

            // Player prop calculations based on position and performance
            generatePlayerProps(player) {
                const ppg = player.points / player.gp;
                const gpg = player.goals / player.gp;
                
                const props = [];
                
                if (player.position === 'A' || player.position === 'M') {
                    // Goals prop
                    const goalLine = Math.max(0.5, Math.round(gpg * 2) / 2);
                    const overProb = gpg > goalLine ? 0.55 : 0.45;
                    props.push({
                        type: 'Goals',
                        line: goalLine,
                        over: this.probabilityToAmerican(overProb),
                        under: this.probabilityToAmerican(1 - overProb)
                    });

                    // Points prop
                    const pointLine = Math.max(0.5, Math.round(ppg * 2) / 2);
                    const pOverProb = ppg > pointLine ? 0.55 : 0.45;
                    props.push({
                        type: 'Points',
                        line: pointLine,
                        over: this.probabilityToAmerican(pOverProb),
                        under: this.probabilityToAmerican(1 - pOverProb)
                    });

                    // Shots prop
                    if (player.shots) {
                        const spg = player.shots / player.gp;
                        const shotLine = Math.max(1.5, Math.round(spg * 2) / 2);
                        props.push({
                            type: 'Shots',
                            line: shotLine,
                            over: -115,
                            under: -105
                        });
                    }
                }

                if (player.position === 'G') {
                    const spg = player.saves / player.gp;
                    const saveLine = Math.max(8.5, Math.round(spg));
                    props.push({
                        type: 'Saves',
                        line: saveLine,
                        over: -110,
                        under: -110
                    });
                }

                if (player.position === 'FO' && player.faceoffPct) {
                    props.push({
                        type: 'FO Win %',
                        line: '50%',
                        over: this.probabilityToAmerican(player.faceoffPct > 0.5 ? 0.6 : 0.4),
                        under: this.probabilityToAmerican(player.faceoffPct > 0.5 ? 0.4 : 0.6)
                    });
                }

                if (player.position === 'D' && player.causedTO) {
                    const ctpg = player.causedTO / player.gp;
                    props.push({
                        type: 'Caused TOs',
                        line: Math.max(0.5, Math.round(ctpg * 2) / 2),
                        over: -115,
                        under: -105
                    });
                }

                return props;
            }
        };

        const DB_NAME = 'LaxOddsDB';

            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => { db = request.result; resolve(db); };
                request.onupgradeneeded = (e) => {
                    const database = e.target.result;
                    ['teams', 'players', 'games', 'odds'].forEach(store => {
                        if (!database.objectStoreNames.contains(store)) {
                            database.createObjectStore(store, { keyPath: 'id', autoIncrement: true });
                        }
                    });
                };
            });
        };

        const dbOp = (store, op, data = null) => {
            return new Promise((resolve, reject) => {
                const tx = db.transaction([store], op === 'getAll' ? 'readonly' : 'readwrite');
                const s = tx.objectStore(store);
                let req;
                switch(op) {
                    case 'put': req = s.put(data); break;
                    case 'getAll': req = s.getAll(); break;
                    case 'clear': req = s.clear(); break;
                }
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        };

                                <div class="odds-item-value neutral">${formatOdds(-110)}</div>
                            </div>
                            <div class="odds-item">
                                <div class="odds-item-team">${oppData.abbrev || 'OPP'} ${parseFloat(odds.spread.line) <= 0 ? '+' : ''}${(-parseFloat(odds.spread.line)).toFixed(1)}</div>
                                <div class="odds-item-value neutral">${formatOdds(-110)}</div>
                            </div>
                        </div>
                    </div>
                    <div class="odds-block">
                        <div class="odds-block-title">Total (O/U)</div>
                        <div class="odds-block-values">
                            <div class="odds-item">
                                <div class="odds-item-team">Over ${odds.total.line}</div>
                                <div class="odds-item-value neutral">${formatOdds(-110)}</div>
                            </div>
                            <div class="odds-item">
                                <div class="odds-item-team">Under ${odds.total.line}</div>
                                <div class="odds-item-value neutral">${formatOdds(-110)}</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="win-prob" style="padding: 0 2rem 1.5rem;">
                    <div class="prob-bar">
                        <div class="prob-fill" style="width: ${odds.winProb.team1}%"></div>
                    </div>
                    <div class="prob-labels">
                        <span>IIT Win: ${odds.winProb.team1}%</span>
                        <span>${oppData.abbrev || 'OPP'} Win: ${odds.winProb.team2}%</span>
                    </div>
                </div>
            `;
        };

        const renderFutureGames = () => {
            const futureGames = Schedule.filter(g => !g.completed);
            const grid = document.getElementById('futureGamesGrid');
            grid.innerHTML = '';

            futureGames.slice(1).forEach(game => { // Skip first (featured)
                const oppKey = game.opponent;
                const oppData = TeamsData[oppKey] || { record: '0-0', abbrev: game.oppName.substring(0,3).toUpperCase() };
                const odds = OddsEngine.generateGameOdds('illinoisTech', oppKey);

                grid.innerHTML += `
                    <div class="game-card">
                        <div class="game-card-header">
                            <div class="game-matchup">
                                <div class="game-team">
                                    <div class="game-team-name" style="color: var(--scarlet)">IIT</div>
                                    <div class="game-team-record">${TeamsData.illinoisTech.record}</div>
                                </div>
                                <div class="game-vs">@</div>
                                <div class="game-team">
                                    <div class="game-team-name">${game.oppName}</div>
                                    <div class="game-team-record">${oppData.record}</div>
                                </div>
                            </div>
                            <div class="game-date-info">
                                <div class="game-date">${game.date}</div>
                                <div class="game-time">${game.time}</div>
                            </div>
                        </div>
                        <div class="game-card-body">
                            <div class="game-odds-row">
                                <div class="game-odds-type">Moneyline</div>
                                <div class="game-odds-values">
                                    <div class="game-odd" style="color: ${odds.moneyline.team1 < 0 ? 'var(--accent-red)' : 'var(--accent-green)'}">IIT ${formatOdds(odds.moneyline.team1)}</div>
                                    <div class="game-odd" style="color: ${odds.moneyline.team2 < 0 ? 'var(--accent-red)' : 'var(--accent-green)'}">OPP ${formatOdds(odds.moneyline.team2)}</div>
                                </div>
                            </div>
                            <div class="game-odds-row">
                                <div class="game-odds-type">Spread</div>
                                <div class="game-odds-values">
                                    <div class="game-odd">IIT ${parseFloat(odds.spread.line) >= 0 ? '+' : ''}${odds.spread.line}</div>
                                </div>
                            </div>
                            <div class="game-odds-row">
                                <div class="game-odds-type">Total</div>
                                <div class="game-odds-values">
                                    <div class="game-odd">O/U ${odds.total.line}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        };

        const renderPastResults = () => {
            const pastGames = Schedule.filter(g => g.completed);
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = '';

            pastGames.forEach(game => {
                const isWin = game.iitScore > game.oppScore;
                grid.innerHTML += `
                    <div class="game-card past">
                        <div class="game-card-header">
                            <div class="game-matchup">
                                <div class="game-team">
                                    <div class="game-team-name" style="color: var(--scarlet)">IIT</div>
                                </div>
                                <div class="game-vs">vs</div>
                                <div class="game-team">
                                    <div class="game-team-name">${game.oppName}</div>
                                </div>
                            </div>
                            <div class="game-date-info">
                                <div class="game-date">${game.date}</div>
                            </div>
                        </div>
                        <div class="game-card-body">
                            <div class="game-result ${isWin ? 'win' : 'loss'}">
                                ${game.result}
                            </div>
                        </div>
                    </div>
                `;
            });
        };

        const renderPlayerProps = () => {
            const grid = document.getElementById('propsGrid');
            grid.innerHTML = '';

            const players = TeamsData.illinoisTech.players.filter(p => p.points > 0 || p.position === 'G' || p.position === 'FO' || p.position === 'D');

            players.forEach(player => {
                const props = OddsEngine.generatePlayerProps(player);
                if (props.length === 0) return;

                let propsHTML = props.map(p => `
                    <div class="prop-line">
                        <div class="prop-type">${p.type} ${p.line}</div>
                        <div class="prop-odds">
                            <div class="prop-odd" style="color: var(--accent-green)">O ${formatOdds(p.over)}</div>
                            <div class="prop-odd" style="color: var(--accent-red)">U ${formatOdds(p.under)}</div>
                        </div>
                    </div>
                `).join('');

                grid.innerHTML += `
                    <div class="prop-card">
                        <div class="prop-header">
                            <div class="prop-player">#${player.number} ${player.name}</div>
                            <div class="prop-position">${player.position}</div>
                        </div>
                        <div class="prop-lines">${propsHTML}</div>
                    </div>
                `;
            });
        };

        const renderComparison = () => {
            const grid = document.getElementById('comparisonGrid');
            const nextGame = Schedule.find(g => !g.completed);
            const oppKey = nextGame?.opponent || 'depauw';
            const opp = TeamsData[oppKey] || TeamsData.depauw;
            const iit = TeamsData.illinoisTech;

            const compareVal = (v1, v2, higherBetter = true) => {
                if (higherBetter) return v1 > v2 ? 'good' : v1 < v2 ? 'bad' : '';
                return v1 < v2 ? 'good' : v1 > v2 ? 'bad' : '';
            };

            grid.innerHTML = `
                <div class="team-stats-card">
                    <div class="team-stats-header" style="color: var(--scarlet)">
                        ILLINOIS TECH
                        <span class="team-record-badge">${iit.record}</span>
                    </div>
                    <div class="team-stats-body">
                        <div class="stat-row"><span class="stat-label">Goals/Game</span><span class="stat-value ${compareVal(iit.goalsPerGame, opp.goalsPerGame)}">${iit.goalsPerGame.toFixed(1)}</span></div>
                        <div class="stat-row"><span class="stat-label">Goals Allowed/Game</span><span class="stat-value ${compareVal(iit.goalsAllowedPerGame, opp.goalsAllowedPerGame, false)}">${iit.goalsAllowedPerGame.toFixed(1)}</span></div>
                        <div class="stat-row"><span class="stat-label">Shot %</span><span class="stat-value ${compareVal(iit.shotPct, opp.shotPct || 0.25)}">${(iit.shotPct * 100).toFixed(1)}%</span></div>
                        <div class="stat-row"><span class="stat-label">Faceoff %</span><span class="stat-value ${compareVal(iit.faceoffPct, opp.faceoffPct)}">${(iit.faceoffPct * 100).toFixed(1)}%</span></div>
                        <div class="stat-row"><span class="stat-label">Clear %</span><span class="stat-value ${compareVal(iit.clearPct, opp.clearPct)}">${(iit.clearPct * 100).toFixed(1)}%</span></div>
                        <div class="stat-row"><span class="stat-label">Save %</span><span class="stat-value ${compareVal(iit.savePct, opp.savePct)}">${(iit.savePct * 100).toFixed(1)}%</span></div>
                        <div class="stat-row"><span class="stat-label">Ground Balls</span><span class="stat-value">${iit.groundBalls}</span></div>
                        <div class="stat-row"><span class="stat-label">Turnovers</span><span class="stat-value ${compareVal(iit.turnovers, opp.turnovers || 50, false)}">${iit.turnovers}</span></div>
                    </div>
                </div>
                <div class="team-stats-card">
                    <div class="team-stats-header">
                        ${nextGame?.oppName?.toUpperCase() || 'OPPONENT'}
                        <span class="team-record-badge">${opp.record}</span>
                    </div>
                    <div class="team-stats-body">
                        <div class="stat-row"><span class="stat-label">Goals/Game</span><span class="stat-value ${compareVal(opp.goalsPerGame, iit.goalsPerGame)}">${opp.goalsPerGame.toFixed(1)}</span></div>
                        <div class="stat-row"><span class="stat-label">Goals Allowed/Game</span><span class="stat-value ${compareVal(opp.goalsAllowedPerGame, iit.goalsAllowedPerGame, false)}">${opp.goalsAllowedPerGame.toFixed(1)}</span></div>
                        <div class="stat-row"><span class="stat-label">Shot %</span><span class="stat-value">${((opp.shotPct || 0.25) * 100).toFixed(1)}%</span></div>
                        <div class="stat-row"><span class="stat-label">Faceoff %</span><span class="stat-value ${compareVal(opp.faceoffPct, iit.faceoffPct)}">${((opp.faceoffPct || 0.5) * 100).toFixed(1)}%</span></div>
                        <div class="stat-row"><span class="stat-label">Clear %</span><span class="stat-value ${compareVal(opp.clearPct, iit.clearPct)}">${((opp.clearPct || 0.75) * 100).toFixed(1)}%</span></div>
                        <div class="stat-row"><span class="stat-label">Save %</span><span class="stat-value ${compareVal(opp.savePct, iit.savePct)}">${((opp.savePct || 0.55) * 100).toFixed(1)}%</span></div>
                        <div class="stat-row"><span class="stat-label">Ground Balls</span><span class="stat-value">${opp.groundBalls || '--'}</span></div>
                        <div class="stat-row"><span class="stat-label">Turnovers</span><span class="stat-value">${opp.turnovers || '--'}</span></div>
                    </div>
                </div>
            `;
        };

        const updateDBStats = async () => {
            try {
                const teams = await dbOp('teams', 'getAll');
                const players = await dbOp('players', 'getAll');
                const games = await dbOp('games', 'getAll');
                const odds = await dbOp('odds', 'getAll');
                
                document.getElementById('teamCount').textContent = teams.length;
                document.getElementById('playerCount').textContent = players.length;
                document.getElementById('gameCount').textContent = games.length;
                document.getElementById('oddsCount').textContent = odds.length;
            } catch(e) {}
        };

        const storeData = async () => {
            // Store teams
            for (const [key, team] of Object.entries(TeamsData)) {
                await dbOp('teams', 'put', { id: key, ...team, updatedAt: new Date().toISOString() });
            }
            // Store players
            const players = TeamsData.illinoisTech.players;
            for (let i = 0; i < players.length; i++) {
                await dbOp('players', 'put', { id: i + 1, ...players[i], team: 'Illinois Tech' });
            }
            // Store games
            for (let i = 0; i < Schedule.length; i++) {
                await dbOp('games', 'put', { id: i + 1, ...Schedule[i] });
            }
            // Store generated odds
            const futureGames = Schedule.filter(g => !g.completed);
            for (let i = 0; i < futureGames.length; i++) {
                const odds = OddsEngine.generateGameOdds('illinoisTech', futureGames[i].opponent);
                await dbOp('odds', 'put', { id: i + 1, gameId: i + 1, ...odds, generatedAt: new Date().toISOString() });
            }
            await updateDBStats();
        };

        // ==========================================
        // EVENT LISTENERS
        // ==========================================
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                await initDB();
                log('IndexedDB connected', 'success');
                
                renderFeaturedGame();
                renderFutureGames();
                renderPastResults();
                renderPlayerProps();
                renderComparison();
                
                await storeData();
                log('All data loaded and odds generated', 'success');
            } catch(e) {
                log(`Error: ${e.message}`, 'error');
            }
        });

        // Tabs
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(`${tab.dataset.tab}-section`).classList.add('active');
            });
        });

        // Format toggle
        document.querySelectorAll('.format-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFormat = btn.dataset.format;
                renderFeaturedGame();
                renderFutureGames();
                renderPlayerProps();
                toast(`Format: ${currentFormat}`);
            });
        });

        // Generate button
        document.getElementById('generateBtn').addEventListener('click', async () => {
            log('Regenerating all betting lines...', 'info');
            await storeData();
            renderFeaturedGame();
            renderFutureGames();
            renderPlayerProps();
            renderComparison();
            toast('Lines regenerated!');
            log('All lines updated', 'success');
        });

        // Export
        document.getElementById('exportBtn').addEventListener('click', async () => {
            const data = {
                teams: await dbOp('teams', 'getAll'),
                players: await dbOp('players', 'getAll'),
                games: await dbOp('games', 'getAll'),
                odds: await dbOp('odds', 'getAll'),
                exportedAt: new Date().toISOString()
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'iit-lacrosse-odds.json';
            a.click();
            toast('Data exported!');
        });

        // Clear DB
        document.getElementById('clearDbBtn').addEventListener('click', async () => {
            if (confirm('Clear all data?')) {
                await dbOp('teams', 'clear');
                await dbOp('players', 'clear');
                await dbOp('games', 'clear');
                await dbOp('odds', 'clear');
                await updateDBStats();
                log('Database cleared', 'warning');
                toast('Cleared');
            }
        });
    </script>
</body>
</html>
