services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://laxodds:laxodds123@db:5432/laxodds
      - DB_SSL=false
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - JWT_EXPIRES_IN=7d
      - SCRAPE_CRON=0 */6 * * *
      - SCRAPE_ON_START=true
      - ADMIN_EMAIL=admin@laxodds.com
      - ADMIN_PASSWORD=admin123
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=laxodds
      - POSTGRES_PASSWORD=laxodds123
      - POSTGRES_DB=laxodds
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laxodds"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
